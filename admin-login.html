<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Respawn Daily</title>
    <meta name="description" content="Next-generation admin login portal">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at top left, rgba(120, 119, 198, 0.3), transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(255, 119, 198, 0.3), transparent 50%),
                radial-gradient(ellipse at center, rgba(0, 255, 136, 0.2), transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #2d1b69 100%);
            background-size: 400% 400%, 400% 400%, 300% 300%, 200% 200%;
            animation: gradientShift 20s ease infinite, pulseGlow 8s ease-in-out infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
            25% { background-position: 100% 50%, 0% 50%, 100% 50%, 100% 50%; }
            50% { background-position: 50% 50%, 50% 50%, 0% 50%, 50% 50%; }
            75% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
            100% { background-position: 0% 50%, 100% 50%, 50% 50%, 0% 50%; }
        }
        
        @keyframes pulseGlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        /* Neural Network Animation */
        .neural-network {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.4;
        }
        
        .neural-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, #00ff88, #00ccff, transparent);
            height: 2px;
            animation: neuralPulse 4s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        @keyframes neuralPulse {
            0%, 100% { opacity: 0; transform: scaleX(0); }
            50% { opacity: 1; transform: scaleX(1); }
        }
        
        .neural-node {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #00ff88, #00ccff);
            border-radius: 50%;
            box-shadow: 0 0 20px #00ff88, 0 0 40px rgba(0, 255, 136, 0.3);
            animation: nodeGlow 3s ease-in-out infinite;
        }
        
        @keyframes nodeGlow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.8); }
        }
        
        /* Floating Geometric Shapes */
        .geometric-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }
        
        .geo-shape {
            position: absolute;
            opacity: 0.1;
            animation: floatShape 20s ease-in-out infinite;
        }
        
        .geo-circle {
            width: 200px;
            height: 200px;
            border: 2px solid rgba(120, 119, 198, 0.5);
            border-radius: 50%;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }
        
        .geo-triangle {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 173px solid rgba(255, 119, 198, 0.3);
            top: 60%;
            right: 10%;
            animation-delay: 5s;
        }
        
        .geo-square {
            width: 150px;
            height: 150px;
            border: 2px solid rgba(0, 255, 136, 0.4);
            transform: rotate(45deg);
            bottom: 20%;
            left: 20%;
            animation-delay: 10s;
        }
        
        .geo-hexagon {
            width: 180px;
            height: 100px;
            background: rgba(0, 204, 255, 0.1);
            clip-path: polygon(30% 0%, 70% 0%, 100% 50%, 70% 100%, 30% 100%, 0% 50%);
            top: 30%;
            right: 30%;
            animation-delay: 15s;
        }
        
        @keyframes floatShape {
            0%, 100% {
                transform: translateY(0px) rotate(0deg) scale(1);
                opacity: 0.1;
            }
            25% {
                transform: translateY(-30px) rotate(90deg) scale(1.1);
                opacity: 0.2;
            }
            50% {
                transform: translateY(20px) rotate(180deg) scale(0.9);
                opacity: 0.15;
            }
            75% {
                transform: translateY(-20px) rotate(270deg) scale(1.05);
                opacity: 0.25;
            }
        }
        
        /* Floating Particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp 15s linear infinite;
        }
        
        .particle-small {
            width: 1px;
            height: 1px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
        }
        
        .particle-medium {
            width: 2px;
            height: 2px;
            background: rgba(0, 255, 136, 0.8);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
        }
        
        .particle-large {
            width: 3px;
            height: 3px;
            background: rgba(0, 204, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.7);
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) translateX(10px) scale(1);
            }
            90% {
                opacity: 1;
                transform: translateY(10vh) translateX(-10px) scale(1);
            }
            100% {
                transform: translateY(-10vh) translateX(20px) scale(0);
                opacity: 0;
            }
        }
        
        /* Responsive Background Adjustments */
        @media (max-width: 768px) {
            .bg-animation {
                animation-duration: 15s, 6s;
            }
            
            .neural-network {
                opacity: 0.2;
            }
            
            .geo-shape {
                opacity: 0.05;
            }
            
            .particle {
                animation-duration: 12s;
            }
        }
        
        @media (max-width: 480px) {
            .geo-circle {
                width: 120px;
                height: 120px;
            }
            
            .geo-triangle {
                border-left-width: 60px;
                border-right-width: 60px;
                border-bottom-width: 104px;
            }
            
            .geo-square {
                width: 80px;
                height: 80px;
            }
            
            .geo-hexagon {
                width: 100px;
                height: 60px;
            }
        }
        
        /* Main Container */
        .login-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 
                0 0 40px rgba(0, 255, 136, 0.1),
                0 0 80px rgba(0, 255, 136, 0.05),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            animation: cardFloat 6s ease-in-out infinite;
            transition: all 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-10px);
            box-shadow: 
                0 0 60px rgba(0, 255, 136, 0.2),
                0 0 120px rgba(0, 255, 136, 0.1),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
        }
        
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-container {
            display: inline-block;
            position: relative;
            margin-bottom: 24px;
        }
        
        .logo-bg {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: logoRotate 10s linear infinite;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
        
        @keyframes logoRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .logo-icon {
            font-size: 36px;
            color: #ffffff;
            animation: iconPulse 2s ease-in-out infinite;
        }
        
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .logo-glow {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg, #00ff88, #00ccff, #ff00ff, #00ff88);
            border-radius: 20px;
            opacity: 0.3;
            filter: blur(15px);
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        .site-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .site-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-weight: 400;
        }
        
        /* Form Styles */
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .form-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            transform: translateY(-2px);
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .form-input:focus + .input-icon {
            color: #00ff88;
        }
        
        .form-input.with-icon {
            padding-left: 50px;
        }
        
        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            padding: 8px;
            border-radius: 8px;
        }
        
        .password-toggle:hover {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }
        
        /* Checkbox */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .checkbox-input {
            width: 20px;
            height: 20px;
            appearance: none;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            margin-right: 12px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .checkbox-input:checked {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border-color: #00ff88;
        }
        
        .checkbox-input:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
        }
        
        .checkbox-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 16px;
            color: #0a0a0a;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }
        
        .btn-text {
            position: relative;
            z-index: 1;
        }
        
        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(10, 10, 10, 0.3);
            border-top: 2px solid #0a0a0a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Links */
        .links-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .link {
            color: #00ff88;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00ff88;
            transition: width 0.3s ease;
        }
        
        .link:hover::after {
            width: 100%;
        }
        
        .link:hover {
            color: #00ccff;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        /* Messages */
        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error-message {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff3b30;
        }
        
        .success-message {
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid rgba(52, 199, 89, 0.3);
            color: #34c759;
        }
        
        .message.show {
            display: block;
        }
        
        /* Admin Request Section */
        .admin-request {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .admin-request p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .request-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .request-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* Footer */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }
        
        .footer-links {
            display: flex;
            gap: 24px;
        }
        
        .footer-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .footer-link:hover {
            color: #00ff88;
        }
        
        /* Funny Monkey Character Styles */
        .funny-character {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        
        .funny-character.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .monkey-container {
            position: relative;
            width: 140px;
            height: 140px;
        }
        
        .monkey-body {
            width: 100%;
            height: 100%;
            position: relative;
            animation: monkeyBounce 3s ease-in-out infinite;
        }
        
        @keyframes monkeyBounce {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(-5deg); }
            50% { transform: translateY(-12px) rotate(0deg); }
            75% { transform: translateY(-8px) rotate(5deg); }
        }
        
        .monkey-face {
            width: 100px;
            height: 90px;
            background: linear-gradient(135deg, #8b6914, #a0522d, #cd853f);
            border-radius: 50% 50% 45% 45%;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(139, 105, 20, 0.3);
        }
        
        /* Ears */
        .ear {
            position: absolute;
            width: 30px;
            height: 35px;
            background: linear-gradient(135deg, #a0522d, #8b6914);
            border-radius: 50% 50% 50% 50%;
            top: 10px;
        }
        
        .left-ear {
            left: 15px;
            transform: rotate(-30deg);
        }
        
        .right-ear {
            right: 15px;
            transform: rotate(30deg);
        }
        
        /* Eyes */
        .eye {
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 35px;
            overflow: hidden;
        }
        
        .left-eye {
            left: 25px;
        }
        
        .right-eye {
            right: 25px;
        }
        
        .eyeball {
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #333, #000);
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
            transition: all 0.3s ease;
        }
        
        .eyelid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #a0522d;
            transform-origin: top;
            transition: all 0.3s ease;
        }
        
        .eye.closed .eyelid {
            transform: scaleY(1);
        }
        
        .eye.open .eyelid {
            transform: scaleY(0);
        }
        
        .eye.peeking .eyeball {
            transform: translateX(2px) scale(1.2);
        }
        
        /* Nose */
        .nose {
            position: absolute;
            width: 12px;
            height: 8px;
            background: #d2691e;
            border-radius: 50%;
            top: 48px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* Mouth */
        .mouth {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 15px;
        }
        
        .mouth-shape {
            width: 100%;
            height: 100%;
            background: #333;
            border-radius: 0 0 15px 15px;
            transition: all 0.3s ease;
        }
        
        .mouth.happy .mouth-shape {
            border-radius: 15px 15px 0 0;
            background: #ff6b6b;
        }
        
        .mouth.surprised .mouth-shape {
            border-radius: 50%;
            background: #ff6b6b;
            height: 20px;
        }
        
        /* Cheeks */
        .cheek {
            position: absolute;
            width: 18px;
            height: 18px;
            background: rgba(139, 69, 19, 0.3);
            border-radius: 50%;
            top: 45px;
        }
        
        .left-cheek {
            left: 12px;
        }
        
        .right-cheek {
            right: 12px;
        }
        
        .cheek.blush {
            background: rgba(255, 107, 107, 0.5);
            animation: blush 0.5s ease;
        }
        
        @keyframes blush {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        /* Thought Bubble */
        .thought-bubble {
            position: absolute;
            top: -40px;
            right: -30px;
            background: white;
            border-radius: 20px;
            padding: 8px 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }
        
        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid white;
        }
        
        .thought-bubble.show {
            opacity: 1;
            transform: scale(1);
        }
        
        .bubble-text {
            font-size: 20px;

<body>
    <!-- 3D Model Container -->
    <div id="threejs-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>
    
    <!-- Animated Background -->

    <!-- Neural Network -->
    <div class="neural-network" id="neuralNetwork"></div>
    
    <!-- Geometric Shapes -->
    <div class="geometric-shapes">
        <div class="geo-shape geo-circle"></div>
        <div class="geo-shape geo-triangle"></div>
        <div class="geo-shape geo-square"></div>
        <div class="geo-shape geo-hexagon"></div>
    </div>
    
    <!-- Particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Main Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-container">
                    <div class="logo-glow"></div>
                    <div class="logo-bg">
                        <i class="fas fa-rocket logo-icon"></i>
                    </div>
                </div>

            <!-- Messages -->
            <div id="errorMessage" class="message error-message">

            </div>
            
            <div id="successMessage" class="message success-message">
                <i class="fas fa-check-circle mr-2"></i>
                Login successful! Redirecting...
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Username -->
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="email" 
                            name="email" 
                            class="form-input with-icon"
                            placeholder="Enter your username"
                            required
                            autocomplete="username"
                        >
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>
                
                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input with-icon"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                            oninput="handlePasswordTyping()"
                        >
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="passwordIcon"></i>
                        </button>
                    </div>
                    
                    <!-- 3D Character Status -->
                    <div class="character-status" id="characterStatus" style="text-align: center; margin-top: 15px; opacity: 0; transition: opacity 0.5s ease;">

                        <div class="status-text" id="statusText" style="font-size: 12px; color: rgba(255, 255, 255, 0.6);"></div>
                    </div>
                </div>
                
                <!-- Remember Me -->
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="remember" class="checkbox-input">
                    <label for="remember" class="checkbox-label">Remember me</label>

                <!-- Submit Button -->

            <!-- Links -->
            <div class="links-container">

                <a href="#" class="link" onclick="showHelp()">Need Help?</a>
            </div>
            
            <!-- Admin Request -->
            <div class="admin-request">
                <p>Don't have admin access?</p>
                <button class="request-btn" onclick="showComingSoon()">

                </button>

    <!-- Footer -->

                <i class="fas fa-home mr-1"></i>
                Back to Site
            </a>
            <a href="#" class="footer-link" onclick="showHelp()">
                <i class="fas fa-question-circle mr-1"></i>
                Help
            </a>
        </div>
    </div>
    
    <script>
        // Global Three.js variables
        let scene, camera, renderer, character, characterEyes = [];
        let characterState = 'idle';
        let animationId;
        
        // Initialize animations
        document.addEventListener('DOMContentLoaded', function() {
            init3DScene();
            createNeuralNetwork();
            createParticles();
        });
        
        // Initialize Three.js scene
        function init3DScene() {
            const container = document.getElementById('threejs-container');
            
            // Scene setup
            scene = new THREE.Scene();
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);
            
            // Create 3D character
            create3DCharacter();
            
            // Start animation loop
            animate();
            
            // Handle window resize
            window.addEventListener('resize', onWindowResize);
        }
        
        // Create 3D character
        function create3DCharacter() {
            character = new THREE.Group();
            
            // Body (sphere)
            const bodyGeometry = new THREE.SphereGeometry(1, 32, 32);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xffd700,
                shininess: 100,
                specular: 0x222222
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            character.add(body);
            
            // Eyes
            const eyeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
            
            // Left eye
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(-0.3, 0.2, 0.9);
            character.add(leftEye);
            
            // Right eye
            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(0.3, 0.2, 0.9);
            character.add(rightEye);
            
            // Eye pupils
            const pupilGeometry = new THREE.SphereGeometry(0.08, 16, 16);
            const pupilMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
            
            const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
            leftPupil.position.set(-0.3, 0.2, 1.05);
            character.add(leftPupil);
            
            const rightPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
            rightPupil.position.set(0.3, 0.2, 1.05);
            character.add(rightPupil);
            
            // Store eye references
            characterEyes = [
                { eye: leftEye, pupil: leftPupil },
                { eye: rightEye, pupil: rightPupil }
            ];
            
            // Eyelids
            const eyelidGeometry = new THREE.SphereGeometry(0.16, 16, 16);
            const eyelidMaterial = new THREE.MeshPhongMaterial({ color: 0xffd700 });
            
            const leftEyelid = new THREE.Mesh(eyelidGeometry, eyelidMaterial);
            leftEyelid.position.set(-0.3, 0.2, 0.9);
            character.add(leftEyelid);
            
            const rightEyelid = new THREE.Mesh(eyelidGeometry, eyelidMaterial);
            rightEyelid.position.set(0.3, 0.2, 0.9);
            character.add(rightEyelid);
            
            // Store eyelid references
            characterEyes[0].eyelid = leftEyelid;
            characterEyes[1].eyelid = rightEyelid;
            
            // Mouth
            const mouthGeometry = new THREE.TorusGeometry(0.3, 0.1, 16, 16);
            const mouthMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
            mouth.position.set(0, -0.3, 0.8);
            mouth.rotation.x = Math.PI;
            character.add(mouth);
            character.mouth = mouth;
            
            // Position character
            character.position.set(0, 0, 0);
            scene.add(character);
        }
        
        // Animation loop
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            // Animate character based on state
            if (character) {
                switch(characterState) {
                    case 'idle':
                        character.rotation.y += 0.005;
                        character.position.y = Math.sin(Date.now() * 0.001) * 0.1;
                        break;
                    case 'typing':
                        character.rotation.y += 0.01;
                        character.position.y = Math.sin(Date.now() * 0.003) * 0.2;
                        break;
                    case 'peeking':
                        character.rotation.y += 0.002;
                        character.position.y = Math.sin(Date.now() * 0.002) * 0.15;
                        break;
                    case 'happy':
                        character.rotation.y += 0.02;
                        character.position.y = Math.sin(Date.now() * 0.004) * 0.3;
                        break;
                    case 'sad':
                        character.rotation.y -= 0.005;
                        character.position.y = Math.sin(Date.now() * 0.001) * 0.05;
                        break;
                }
            }
            
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Create neural network effect
        function createNeuralNetwork() {
            const network = document.getElementById('neuralNetwork');
            const nodeCount = 15;
            const lineCount = 8;
            
            // Create nodes
            for (let i = 0; i < nodeCount; i++) {
                const node = document.createElement('div');
                node.className = 'neural-node';
                node.style.left = Math.random() * 100 + '%';
                node.style.top = Math.random() * 100 + '%';
                node.style.animationDelay = Math.random() * 3 + 's';
                network.appendChild(node);
            }
            
            // Create connecting lines
            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.className = 'neural-line';
                line.style.left = Math.random() * 100 + '%';
                line.style.top = Math.random() * 100 + '%';
                line.style.width = Math.random() * 200 + 50 + 'px';
                line.style.transform = `rotate(${Math.random() * 360}deg)`;
                line.style.animationDelay = Math.random() * 4 + 's';
                network.appendChild(line);
            }
        }
        
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 80;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                
                // Random particle type
                const types = ['particle-small', 'particle-medium', 'particle-large'];
                const type = types[Math.floor(Math.random() * types.length)];
                particle.className = `particle ${type}`;
                
                // Random position and animation
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (12 + Math.random() * 8) + 's';
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Handle password typing
        function handlePasswordTyping() {
            characterState = 'typing';
            
            // Close eyes when typing password
            characterEyes.forEach(eyeData => {
                eyeData.eyelid.visible = true;
                eyeData.eyelid.scale.y = 1;
            });
            
            // Show status
            showCharacterStatus('🙈', 'Covering eyes...');
        }
        
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                // Show password - 3D character peeks
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
                
                characterState = 'peeking';
                
                // Open eyes slightly and make them peek
                characterEyes.forEach(eyeData => {
                    eyeData.eyelid.visible = true;
                    eyeData.eyelid.scale.y = 0.3;
                    eyeData.pupil.position.x += 0.05;
                });
                
                // Change mouth to surprised
                if (character.mouth) {
                    character.mouth.scale.y = 1.5;
                    character.mouth.material.color.setHex(0xff6b6b);
                }
                
                // Show status
                showCharacterStatus('👀', 'Peeking...');
                
            } else {
                // Hide password - 3D character closes eyes
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
                
                characterState = 'typing';
                
                // Close eyes
                characterEyes.forEach(eyeData => {
                    eyeData.eyelid.visible = true;
                    eyeData.eyelid.scale.y = 1;
                    eyeData.pupil.position.x -= 0.05;
                });
                
                // Reset mouth
                if (character.mouth) {
                    character.mouth.scale.y = 1;
                    character.mouth.material.color.setHex(0x333333);
                }
                
                // Show status
                showCharacterStatus('🙈', 'Covering eyes...');
            }
        }
        
        // Show character status
        function showCharacterStatus(emoji, text) {
            const statusDiv = document.getElementById('characterStatus');
            const statusEmoji = document.getElementById('statusEmoji');
            const statusText = document.getElementById('statusText');
            
            statusEmoji.textContent = emoji;
            statusText.textContent = text;
            statusDiv.style.opacity = '1';
            
            // Hide after 3 seconds
            setTimeout(() => {
                statusDiv.style.opacity = '0';
            }, 3000);
        }
        
        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Hide messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            
            // Show loading state
            submitBtn.classList.add('loading');
            btnText.textContent = 'Authenticating...';
            btnSpinner.style.display = 'block';
            
            // Simulate authentication
            setTimeout(() => {
                const approvedAdmins = JSON.parse(localStorage.getItem('approvedAdmins') || '[]');
                const defaultAdmin = { email: 'admin', password: 'admin123' };
                
                let isValid = false;
                
                // Check default admin
                if (email === 'admin' && password === 'admin123') {
                    isValid = true;
                }
                
                // Check approved admins
                if (!isValid && approvedAdmins.length > 0) {
                    isValid = approvedAdmins.some(admin => admin.email === email && admin.password === password);
                }
                
                if (isValid) {
                    // Success
                    successMessage.classList.add('show');
                    btnText.textContent = 'Success!';
                    submitBtn.style.background = 'linear-gradient(135deg, #34c759, #30d158)';
                    
                    // Make 3D character happy
                    characterState = 'happy';
                    
                    // Open eyes wide with happiness
                    characterEyes.forEach(eyeData => {
                        eyeData.eyelid.visible = false;
                        eyeData.pupil.scale.set(1.2, 1.2, 1.2);
                    });
                    
                    // Happy mouth
                    if (character.mouth) {
                        character.mouth.scale.y = 0.5;
                        character.mouth.material.color.setHex(0xff6b6b);
                    }
                    
                    // Show status
                    showCharacterStatus('🎉', 'Success!');
                    
                    // Store session
                    if (remember) {
                        localStorage.setItem('adminEmail', email);
                        localStorage.setItem('adminSession', 'true');
                    } else {
                        sessionStorage.setItem('adminSession', 'true');
                    }
                    
                    // Redirect
                    setTimeout(() => {
                        window.location.href = 'index.html?openAdmin=true';
                    }, 1500);
                } else {
                    // Error
                    errorMessage.classList.add('show');
                    btnText.textContent = 'Access Portal';
                    btnSpinner.style.display = 'none';
                    submitBtn.classList.remove('loading');
                    submitBtn.style.background = 'linear-gradient(135deg, #ff3b30, #ff6b6b)';
                    
                    // Make 3D character sad
                    characterState = 'sad';
                    
                    // Close eyes with sadness
                    characterEyes.forEach(eyeData => {
                        eyeData.eyelid.visible = true;
                        eyeData.eyelid.scale.y = 1;
                        eyeData.pupil.scale.set(0.8, 0.8, 0.8);
                    });
                    
                    // Sad mouth
                    if (character.mouth) {
                        character.mouth.scale.y = 2;
                        character.mouth.material.color.setHex(0x333333);
                    }
                    
                    // Show status
                    showCharacterStatus('😢', 'Error!');
                    
                    // Shake animation for character
                    if (character) {
                        const originalX = character.position.x;
                        let shakeTime = 0;
                        const shakeInterval = setInterval(() => {
                            shakeTime += 0.1;
                            character.position.x = originalX + Math.sin(shakeTime * 50) * 0.1;
                            if (shakeTime > 0.5) {
                                clearInterval(shakeInterval);
                                character.position.x = originalX;
                            }
                        }, 50);
                    }
                    
                    // Shake animation for login card
                    const loginCard = document.querySelector('.login-card');
                    loginCard.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        loginCard.style.animation = '';
                        submitBtn.style.background = '';
                    }, 500);
                }
            }, 2000);
        }
        
        // Show help
        function showHelp() {
            alert('Admin Portal Help:\n\n• Default credentials: admin/admin123\n• For approved admins: Use your assigned credentials\n• Contact administrator for access issues\n\nNote: Admin request feature coming soon!');
        }
        
        // Show coming soon
        function showComingSoon() {
            alert('🚧 Coming Soon!\n\nAdmin request functionality is under development.\n\nFeatures coming:\n• Secure request submission\n• Review workflow\n• Real-time tracking\n• Cross-device sync\n\nContact admin directly for immediate access.');
        }
        
        // Check existing session
        window.addEventListener('load', function() {
            const adminSession = localStorage.getItem('adminSession') || sessionStorage.getItem('adminSession');
            const adminEmail = localStorage.getItem('adminEmail');
            
            if (adminSession === 'true') {
                window.location.href = 'index.html?admin=loggedin';
            } else if (adminEmail) {
                document.getElementById('email').value = adminEmail;
                document.getElementById('remember').checked = true;
            }
        });
        
        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
